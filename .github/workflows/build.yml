name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch originals
        run: |
          git clone --depth=1 \
            https://x-access-token:${{ secrets.ORIGINALS_TOKEN }}@github.com/roengstrom/ff8-decomp-dependencies.git \
            /tmp/deps
          cp -r /tmp/deps/original ./

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils-mipsel-linux-gnu \
            cpp

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Create venv and install Python dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Make toolchain binaries executable
        run: |
          chmod +x tools/gcc-2.7.2-cdk/cc1
          chmod +x tools/gcc-2.8.0-psx/cc1
          chmod +x tools/objdiff/objdiff

      - name: Build and verify
        run: make full

      - name: Generate progress report
        run: make report

      - name: Generate progress site and badges
        if: github.event_name != 'pull_request'
        run: .venv/bin/python tools/generate_progress_site.py
        env:
          PAGES_BASE_URL: https://roengstrom.github.io/ff8-decomp

      - name: Upload progress report artifact
        uses: actions/upload-artifact@v4
        with:
          name: SLUS_008.92_report
          path: build/report.json

      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        if: github.event_name != 'pull_request'
        uses: actions/deploy-pages@v4