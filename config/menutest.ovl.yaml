options:
  basename: menutest
  target_path: original/menutest.ovl
  elf_path: build/ovl/menutest/menutest.elf
  base_path: ..
  platform: psx
  compiler: PSYQ

  # Directory layout
  asm_path: asm/ovl/menutest
  src_path: src/menu/menutest
  build_path: build/ovl/menutest

  # Linker
  ld_script_path: config/menutest.ovl.ld
  ld_dependencies: True
  ld_align_section_vram_end: False
  ld_align_segment_vram_end: False

  # Analysis
  find_file_boundaries: True
  disassemble_all: True

  # Symbols
  symbol_addrs_path:
    - config/symbol_addrs.menutest.txt
  undefined_funcs_auto_path: config/undefined_funcs_auto.menutest.txt
  undefined_syms_auto_path: config/undefined_syms_auto.menutest.txt

  # String detection
  string_encoding: ASCII
  data_string_encoding: ASCII
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2

  # Misc
  section_order: [".text", ".rodata", ".data"]
  subalign: 2
  o_as_suffix: True
  use_legacy_include_asm: False
  generate_asm_macros_files: False

segments:
