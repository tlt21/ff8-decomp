name: world.bin
sha1: b421bf83a307dcd41536b14dc81a3aa03f7c9ed0
options:
  basename: world
  target_path: original/world.bin
  elf_path: build/ovl/world/world.elf
  base_path: ..
  platform: psx
  compiler: PSYQ

  # Directory layout
  asm_path: asm/ovl/world
  src_path: src/world
  build_path: build/ovl/world

  # Linker
  ld_script_path: config/world.ovl.ld
  ld_dependencies: True
  ld_align_section_vram_end: False
  ld_align_segment_vram_end: False

  # Analysis
  find_file_boundaries: True
  disassemble_all: True

  # Symbols
  symbol_addrs_path:
    - config/symbol_addrs.world.txt
  undefined_funcs_auto_path: config/undefined_funcs_auto.world.txt
  undefined_syms_auto_path: config/undefined_syms_auto.world.txt

  # String detection
  string_encoding: ASCII
  data_string_encoding: ASCII
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2

  # Misc
  section_order: [".rodata", ".text", ".data", ".bss"]
  subalign: 1
  o_as_suffix: True
  use_legacy_include_asm: False
  generate_asm_macros_files: False

