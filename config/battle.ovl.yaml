name: battle.bin
sha1: fa3b045925c0cc8855b321f5dd22ff196f9d51b0
options:
  basename: battle
  target_path: original/battle.bin
  elf_path: build/ovl/battle/battle.elf
  base_path: ..
  platform: psx
  compiler: PSYQ

  # Directory layout
  asm_path: asm/ovl/battle
  src_path: src/battle
  build_path: build/ovl/battle

  # Linker
  ld_script_path: config/battle.ovl.ld
  ld_dependencies: True
  ld_align_section_vram_end: False
  ld_align_segment_vram_end: False

  # Analysis
  find_file_boundaries: True
  disassemble_all: True

  # Symbols
  symbol_addrs_path:
    - config/symbol_addrs.battle.txt
  undefined_funcs_auto_path: config/undefined_funcs_auto.battle.txt
  undefined_syms_auto_path: config/undefined_syms_auto.battle.txt

  # String detection
  string_encoding: ASCII
  data_string_encoding: ASCII
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2

  # Misc
  section_order: [".text", ".rodata", ".data", ".bss"]
  subalign: 2
  o_as_suffix: True
  use_legacy_include_asm: False
  generate_asm_macros_files: False

segments:
  - name: battle
    type: code
    start: 0x0
    vram: 0x80098000
    subsegments:
      - [0x0, asm, bc_dispatch]
      - { start: 0x18, type: .rodata, name: bc_object1, linker_section_order: .text }
      - [0x30, asm, bc_dispatch_obf]
      - { start: 0x130, type: .rodata, name: bc_object2, linker_section_order: .text }
      - { start: 0x180, type: data, name: bc_dispatch_post, linker_section_order: .text }
      - [0x1FE8, c, bc_object1]
      - [0x3AC4, c, bc_object2]
      - [0x98E0, c, bc_object3]
      - [0xE184, c, bc_object4]
      - [0x10B7C, c, bc_object5]
      - [0x134A8, c, bc_object6]
      - [0x17358, c, bc_object7]
